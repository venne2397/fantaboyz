<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FantaMondiale 2026</title>
<style>
:root{--bg:#0a0e1a;--bg2:#131929;--sf:#1a2236;--sf2:#222d44;--tx:#e8ecf4;--tx2:#9ba8c2;--tx3:#5e6d87;--bd:#2a3650;--bd2:#1e2a40;--pr:#4f8cff;--ok:#34d399;--er:#f87171;--wa:#fbbf24;--gd:#ffd700;--sv:#c0c0c0;--bz:#cd7f32;--fn:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;--mn:'SF Mono',Consolas,monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:var(--fn);padding:20px;min-height:100vh;-webkit-text-size-adjust:100%;touch-action:manipulation}
.ctr{max-width:1100px;margin:0 auto}
.hdr{text-align:center;margin-bottom:28px;padding:28px 20px;background:linear-gradient(135deg,var(--sf),var(--bg2));border-radius:16px;border:1px solid var(--bd)}
.hdr h1{font-size:2rem;font-weight:700;margin-bottom:4px;display:flex;align-items:center;justify-content:center;gap:12px}
.hdr-title{background:linear-gradient(135deg,var(--pr),var(--ok));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-trophy{font-size:42px;-webkit-text-fill-color:initial}
.hdr p{color:var(--tx2);font-size:13px}
.ctrl{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:14px 16px;margin-bottom:24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.btn{padding:9px 16px;background:var(--pr);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer}
.btn:hover{opacity:0.85}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.btn2{background:var(--sf2);border:1px solid var(--bd)}
.status{font-size:11px;padding:5px 10px;border-radius:50px;margin-left:auto}
.s-ok{background:rgba(52,211,153,.15);color:var(--ok)}
.s-er{background:rgba(248,113,113,.15);color:var(--er)}
.s-ld{background:rgba(79,140,255,.15);color:var(--pr)}
.board{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:14px;margin-bottom:28px}
.cd{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:18px 12px;text-align:center;position:relative;transition:transform .15s}
.cd:hover{transform:translateY(-2px)}
.cd.r1{border-color:var(--gd);box-shadow:0 0 16px rgba(255,215,0,.1)}
.cd.r2{border-color:var(--sv)}.cd.r3{border-color:var(--bz)}
.rk{position:absolute;top:8px;left:10px;font-size:11px;font-weight:700;color:var(--tx3)}
.cd.r1 .rk{color:var(--gd)}.cd.r2 .rk{color:var(--sv)}.cd.r3 .rk{color:var(--bz)}
.nm{font-size:15px;font-weight:700;margin-bottom:6px}
.pt{font-size:28px;font-weight:800;font-family:var(--mn);color:var(--pr);margin-bottom:2px}
.cd.r1 .pt{color:var(--gd)}
.lb{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em}
.nm span:hover{transform:scale(1.3);display:inline-block;transition:transform .15s}
.tabs{display:flex;gap:3px;margin-bottom:20px;background:var(--sf);border-radius:12px;padding:4px;border:1px solid var(--bd)}
.tab{flex:1;padding:9px 10px;background:transparent;border:none;border-radius:6px;color:var(--tx2);font-size:12px;font-weight:500;cursor:pointer}
.tab:hover{color:var(--tx)}.tab.on{background:var(--pr);color:#fff}
.pnl{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:20px;margin-bottom:20px;display:none}
.pnl.show{display:block}
.pnl h2{font-size:15px;font-weight:600;margin-bottom:14px}
.pnl h3{font-size:13px;font-weight:600;margin:14px 0 6px;color:var(--tx2)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;color:var(--tx3);font-weight:500;padding:7px 10px;border-bottom:1px solid var(--bd);font-size:10px;text-transform:uppercase;letter-spacing:.04em}
td{padding:8px 10px;border-bottom:1px solid var(--bd2)}
tr:hover td{background:var(--sf2)}
.t1{color:var(--pr)}.t2{color:var(--ok)}.t3{color:var(--wa)}.t4{color:var(--er)}
.match{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg);border-radius:6px;border:1px solid var(--bd2);margin-bottom:6px;font-size:12px}
.match.live{border-color:var(--ok);background:rgba(52,211,153,.03)}
.mteams{flex:1;display:flex;align-items:center;justify-content:center;gap:10px}
.mscore{font-family:var(--mn);font-weight:700;font-size:15px;min-width:44px;text-align:center}
.mdate{font-size:10px;color:var(--tx3);min-width:55px}
.mst{font-size:10px;min-width:60px;text-align:right;color:var(--tx3)}
.mst.live{color:var(--ok);font-weight:600}
.owned{color:var(--pr);font-weight:600}
.brk{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:6px;margin-top:8px}
.bi{display:flex;justify-content:space-between;align-items:center;padding:7px 12px;background:var(--bg);border-radius:6px;border:1px solid var(--bd2)}
.bl{font-size:11px;color:var(--tx2)}.bv{font-family:var(--mn);font-size:13px;font-weight:600;color:var(--ok)}.bv.zero{color:var(--tx3)}
.upd{text-align:center;font-size:11px;color:var(--tx3);margin-top:14px;padding:8px;background:var(--sf);border-radius:8px;border:1px solid var(--bd)}
.log{font-size:10px;color:var(--tx3);margin-top:8px;padding:8px;background:var(--bg);border-radius:6px;max-height:60px;overflow-y:auto;font-family:var(--mn)}
.matchlist{max-height:500px;overflow-y:auto}
@media(max-width:768px){
body{padding:8px}
.hdr{padding:16px 12px;margin-bottom:16px}
.hdr h1{font-size:1.3rem}
.hdr h1 img{height:32px!important}
.hdr p{font-size:11px}
.board{grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}
.cd{padding:12px 8px}
.pt{font-size:20px}
.nm{font-size:13px}
.rk{font-size:10px;top:5px;left:6px}

.tab{font-size:11px;padding:8px 6px;white-space:nowrap}
.pnl{padding:14px;margin-bottom:14px}
.pnl h2{font-size:14px}
.pnl h3{font-size:12px}
table{font-size:11px}
th{font-size:9px;padding:5px 6px}
td{padding:6px}
.match{padding:8px 10px;gap:6px;flex-wrap:wrap}
.mteams{font-size:11px;gap:6px}
.mscore{font-size:13px;min-width:36px}
.mdate{font-size:9px;min-width:40px}
.mst{font-size:9px;min-width:40px}
.powner{display:block;margin-left:0}
.next-games{padding:12px}
.next-game{flex-wrap:wrap;gap:6px;padding:8px 10px}
.ng-teams{font-size:11px;gap:5px;flex-wrap:wrap;justify-content:center}
.ng-countdown{font-size:11px;min-width:55px}
.ng-time{font-size:9px;min-width:auto;width:100%;text-align:center;margin-top:4px}
.brk{grid-template-columns:1fr}
.bi{padding:6px 10px}
.bl{font-size:10px}
.emoji-modal{max-width:280px;padding:16px}
.emoji-grid{grid-template-columns:repeat(6,1fr)}
.emoji-opt{font-size:18px;padding:4px}
.log{font-size:9px}
.upd{font-size:10px}
}
@media(max-width:380px){
.teams-table td:first-child{width:auto}.teams-table td{font-size:9px;padding:3px 2px}

.board{grid-template-columns:repeat(2,1fr);gap:6px}
.cd{padding:10px 6px}
.pt{font-size:18px}
.nm{font-size:11px}
.tabs{gap:1px}
.tab{font-size:10px;padding:7px 4px}
}

.emoji-btn{cursor:pointer;font-size:18px;padding:2px 4px;border-radius:4px;border:1px solid transparent;transition:all .1s}
.emoji-btn:hover{border-color:var(--pr);background:var(--sf2)}
.emoji-modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:20px;z-index:1000;box-shadow:0 20px 60px rgba(0,0,0,.5);max-width:320px;width:90%}
.emoji-modal h3{font-size:14px;margin-bottom:12px;color:var(--tx)}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;margin-bottom:12px}
.emoji-opt{font-size:22px;padding:6px;text-align:center;cursor:pointer;border-radius:6px;border:1px solid transparent;transition:all .1s}
.emoji-opt:hover{background:var(--sf2);border-color:var(--bd);transform:scale(1.2)}
.emoji-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:999}
.powner{font-size:9px;color:var(--wa);margin-left:3px;font-weight:400}


.next-games{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:24px}
.next-games h3{font-size:13px;color:var(--tx2);margin-bottom:12px;text-transform:uppercase;letter-spacing:.04em}
.next-game{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--bg);border-radius:8px;border:1px solid var(--bd2);margin-bottom:8px}
.next-game:last-child{margin-bottom:0}
.ng-countdown{font-family:var(--mn);font-size:13px;font-weight:700;color:var(--wa);min-width:70px;text-align:center}
.ng-countdown.live{color:var(--ok);animation:pulse 1.5s infinite}
.ng-teams{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px}
.ng-vs{color:var(--tx3);font-size:10px;font-weight:600}
.ng-player{font-size:9px;color:var(--wa);margin-left:2px}
.ng-time{font-size:10px;color:var(--tx3);min-width:80px;text-align:right}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

.pnl table{table-layout:auto}
.pnl table th,.pnl table td{text-align:center}
.pnl table th:nth-child(1),.pnl table td:nth-child(1){width:40%;text-align:left}
.pnl table th:nth-child(2),.pnl table td:nth-child(2){width:20%}
.pnl table th:nth-child(3),.pnl table td:nth-child(3){width:15%}
.pnl table th:nth-child(4),.pnl table td:nth-child(4){width:25%}

.rules-table{table-layout:fixed;width:100%;font-size:11px}
.rules-table th,.rules-table td{text-align:center;padding:6px 4px;white-space:nowrap}
.rules-table th:first-child,.rules-table td:first-child{text-align:left;width:35%;white-space:normal}
.rules-table th:not(:first-child),.rules-table td:not(:first-child){width:16%}
@media(max-width:768px){
.rules-table{font-size:10px}
.rules-table th,.rules-table td{padding:4px 2px}
.rules-table th:first-child,.rules-table td:first-child{width:28%}
.rules-table th:not(:first-child),.rules-table td:not(:first-child){width:14%}
}
@media(max-width:380px){
.rules-table{font-size:9px}
.rules-table th:first-child,.rules-table td:first-child{width:25%}
}

.teams-table td{white-space:normal!important;font-size:10px;line-height:1.6}
.teams-table td img{width:14px!important;margin-right:2px!important}

.bkt-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:10px 0 10px 0}
.bkt{display:flex;align-items:center;min-width:max-content}
.bkt-round{min-width:180px;padding:0 4px}
.bkt-col{display:flex;flex-direction:column;justify-content:space-around;height:100%}
.bkt-rtitle{text-align:center;font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;font-weight:600}
.bkt-pair{display:flex;flex-direction:column;justify-content:center;padding:4px 0;position:relative;margin:2px 0}
.bkt-pair.has-line::after{content:'';position:absolute;right:-14px;top:25%;height:50%;border-right:2px solid var(--tx3);opacity:0.3}
.bkt-pair.has-line::before{content:'';position:absolute;right:-14px;top:50%;width:14px;border-top:2px solid var(--tx3);opacity:0.3}
.bkt-match{background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:6px 10px;margin:3px 0;font-size:11px;position:relative}
.bkt-match.done{border-color:var(--ok)}
.bkt-match::before{content:'';position:absolute;left:-14px;top:50%;width:14px;border-top:2px solid var(--tx3);opacity:0.3}
.bkt-round:first-child .bkt-match::before{display:none}
.bkt-team{display:flex;align-items:center;justify-content:space-between;padding:2px 0}
.bkt-team.won{color:var(--ok);font-weight:700;background:rgba(34,197,94,0.08);border-radius:4px;padding:3px 5px;margin:-3px -5px}
.bkt-team.lost{color:var(--tx3);opacity:0.6}
.bkt-score{font-family:var(--mn);font-weight:700;min-width:18px;text-align:right}
.bkt-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:11px}
.bkt-pl{font-size:9px;color:var(--wa);margin-left:4px}
.bkt-pen{font-size:9px;color:var(--tx3);font-style:italic}.bkt-pen.pen-home::before{content:'\2713 ';color:var(--ok);font-weight:700}.bkt-pen.pen-away::after{content:' \2713';color:var(--ok);font-weight:700}
.bkt-extra{text-align:center;padding-top:2px;border-top:1px solid var(--bd);margin-top:3px}
</style>
</head>
<body>
<div class="ctr">
  <div class="hdr">
    <h1><span class="hdr-trophy">🏆</span><span class="hdr-title">Fanta BOYZ</span><span class="hdr-trophy">🏆</span></h1>
    <p>Fantasy World Cup 2026 &mdash; Live Scoreboard</p>
  </div>
  <div class="ctrl">
    <button class="btn" id="fetchBtn" onclick="doFetch()">&#x21bb; Aggiorna Ora</button>
    <button class="btn btn2" id="autoBtn" onclick="toggleAuto()">&#x23F0; Auto 5min</button>
    
    <span class="status s-er" id="badge">In attesa...</span>
  </div>
  <div class="next-games" id="liveGames" style="display:none"></div>
  <div class="next-games" id="nextGames"></div>

  <div class="tabs" id="tabs"></div>

  <div class="pnl" id="p-bracket"></div>
  <div class="pnl" id="p-rules"></div>
  <div class="upd" id="upd">Clicca "Aggiorna Ora" per caricare risultati live</div>
  <div class="log" id="log"></div>
</div>
<script>


var PLAYERS={
GA8:[{n:"Germany",t:1,it:"Germania",f:"de"},{n:"Netherlands",t:1,it:"Paesi Bassi",f:"nl"},{n:"Korea Republic",t:2,it:"Corea del Sud",f:"kr"},{n:"Austria",t:2,it:"Austria",f:"at"},{n:"Ivory Coast",t:3,it:"Costa d Avorio",f:"ci"},{n:"Sweden",t:3,it:"Svezia",f:"se"},{n:"Haiti",t:4,it:"Haiti",f:"ht"},{n:"Panama",t:4,it:"Panama",f:"pa"}],
INSI:[{n:"Argentina",t:1,it:"Argentina",f:"ar"},{n:"England",t:1,it:"Inghilterra",f:"gb-eng"},{n:"Canada",t:2,it:"Canada",f:"ca"},{n:"Senegal",t:2,it:"Senegal",f:"sn"},{n:"Saudi Arabia",t:3,it:"Arabia Saudita",f:"sa"},{n:"Norway",t:3,it:"Norvegia",f:"no"},{n:"Tunisia",t:4,it:"Tunisia",f:"tn"},{n:"Jordan",t:4,it:"Giordania",f:"jo"}],
VENNE:[{n:"Switzerland",t:1,it:"Svizzera",f:"ch"},{n:"Brazil",t:1,it:"Brasile",f:"br"},{n:"Iran",t:2,it:"Iran",f:"ir"},{n:"Croatia",t:2,it:"Croazia",f:"hr"},{n:"Czechia",t:3,it:"Rep Ceca",f:"cz"},{n:"Paraguay",t:3,it:"Paraguay",f:"py"},{n:"Australia",t:4,it:"Australia",f:"au"},{n:"New Zealand",t:4,it:"Nuova Zelanda",f:"nz"}],
BELLA:[{n:"Mexico",t:1,it:"Messico",f:"mx"},{n:"Portugal",t:1,it:"Portogallo",f:"pt"},{n:"Uruguay",t:2,it:"Uruguay",f:"uy"},{n:"Colombia",t:2,it:"Colombia",f:"co"},{n:"Bosnia-Herzegovina",t:3,it:"Bosnia ed Erz",f:"ba"},{n:"Ghana",t:3,it:"Ghana",f:"gh"},{n:"Iraq",t:4,it:"Iraq",f:"iq"},{n:"Congo DR",t:4,it:"Congo",f:"cd"}],
GIOVA:[{n:"Belgium",t:1,it:"Belgio",f:"be"},{n:"Spain",t:1,it:"Spagna",f:"es"},{n:"Morocco",t:2,it:"Marocco",f:"ma"},{n:"Japan",t:2,it:"Giappone",f:"jp"},{n:"Egypt",t:3,it:"Egitto",f:"eg"},{n:"Algeria",t:3,it:"Algeria",f:"dz"},{n:"South Africa",t:4,it:"Sudafrica",f:"za"},{n:"Qatar",t:4,it:"Qatar",f:"qa"}],
BLANCO:[{n:"United States",t:1,it:"Stati Uniti",f:"us"},{n:"France",t:1,it:"Francia",f:"fr"},{n:"Turkey",t:2,it:"Turchia",f:"tr"},{n:"Ecuador",t:2,it:"Ecuador",f:"ec"},{n:"Scotland",t:3,it:"Scozia",f:"gb-sct"},{n:"Uzbekistan",t:3,it:"Uzbekistan",f:"uz"},{n:"Curacao",t:4,it:"Curacao",f:"cw"},{n:"Cape Verde",t:4,it:"Capo Verde",f:"cv"}]
};
var MULT={1:1,2:1.5,3:2,4:3};
var keys=Object.keys(PLAYERS);
var MATCHES=[];
var autoInterval=null;

var DEFAULT_ICONS={GA8:"🇩🇪",INSI:"🇦🇷",VENNE:"🇨🇭",BELLA:"🇲🇽",GIOVA:"🇪🇸",BLANCO:"🇫🇷"};
var PLAYER_ICONS=(function(){try{var s=localStorage.getItem("fantaboyz_icons");if(s)return JSON.parse(s);}catch(e){}return JSON.parse(JSON.stringify(DEFAULT_ICONS));})();
function saveIcons(){try{localStorage.setItem("fantaboyz_icons",JSON.stringify(PLAYER_ICONS));}catch(e){}}

// Flag helper - uses flagcdn.com for nice flag images
function flag(code,size){
  if(!code) return "";
  size=size||16;
  return '<img src="https://flagcdn.com/'+size+'x'+Math.round(size*0.75)+'/'+code+'.png" width="'+size+'" style="vertical-align:middle;margin-right:4px;border-radius:2px">';
}
function flagForTeam(teamName){
  if(!teamName) return null;
  var ln=teamName.toLowerCase().replace(/[^a-z\s]/g,"").trim();
  for(var i=0;i<keys.length;i++){var teams=PLAYERS[keys[i]];for(var j=0;j<teams.length;j++){
    var tn=teams[j].n.toLowerCase().replace(/[^a-z\s]/g,"").trim();
    if(tn===ln||ln.indexOf(tn)>=0||tn.indexOf(ln)>=0) return teams[j].f;
    var it=teams[j].it.toLowerCase().replace(/[^a-z\s]/g,"").trim();
    if(it===ln||ln.indexOf(it)>=0||it.indexOf(ln)>=0) return teams[j].f;
    var aliases=TEAM_ALIASES[teams[j].n];
    if(aliases){for(var a=0;a<aliases.length;a++){if(aliases[a]===ln||ln.indexOf(aliases[a])>=0||aliases[a].indexOf(ln)>=0) return teams[j].f;}}
  }}
  return null;
}

// APIs to try in order (CORS-enabled ones first)
var APIS=[
  {name:"worldcup26.ir",url:"https://worldcup26.ir/get/games",auth:null,parse:"worldcup26"},
  {name:"worldcup26.ir/api",url:"https://worldcup26.ir/api/games",auth:null,parse:"worldcup26"},
  {name:"corsproxy+football-data",url:"https://corsproxy.io/?"+encodeURIComponent("https://api.football-data.org/v4/competitions/WC/matches"),auth:"bbcaa923e9bc4b4d93b947c339ccf3b4",parse:"footballdata"},
  {name:"allorigins+football-data",url:"https://api.allorigins.win/raw?url="+encodeURIComponent("https://api.football-data.org/v4/competitions/WC/matches"),auth:"bbcaa923e9bc4b4d93b947c339ccf3b4",parse:"footballdata"}
];

function log(msg){var el=document.getElementById("log");el.textContent=new Date().toLocaleTimeString("it-IT")+" - "+msg+"\n"+el.textContent;}

var TEAM_ALIASES={
"Korea Republic":["south korea","korea","korea rep"],
"Ivory Coast":["cote divoire","cte divoire","ivory coast"],
"United States":["usa","united states","us"],
"Czechia":["czech republic","czechia"],
"Bosnia-Herzegovina":["bosnia and herzegovina","bosnia","bosnia herzegovina"],
"Congo DR":["dr congo","congo","democratic republic of congo"],
"Cape Verde":["cabo verde","cape verde"],
"Turkey":["turkiye","trkiye"],
"Curacao":["curaao","curacao"],
"New Zealand":["new zealand","nz"]
};

function findOwner(name){
  if(!name) return null;
  var ln=name.toLowerCase().replace(/[^a-z\s]/g,"").trim();
  for(var i=0;i<keys.length;i++){
    var teams=PLAYERS[keys[i]];
    for(var j=0;j<teams.length;j++){
      var tn=teams[j].n.toLowerCase().replace(/[^a-z\s]/g,"").trim();
      if(tn===ln||ln.indexOf(tn)>=0||tn.indexOf(ln)>=0) return{player:keys[i],team:teams[j]};
      var aliases=TEAM_ALIASES[teams[j].n];
      if(aliases){for(var a=0;a<aliases.length;a++){if(aliases[a]===ln||ln.indexOf(aliases[a])>=0||aliases[a].indexOf(ln)>=0) return{player:keys[i],team:teams[j]};}}
    }
  }
  return null;

// Normalize team name for lookup
function normTeam(name){
  var n=(name||"").toLowerCase().trim();
  if(n.indexOf("bosnia")>=0) return "bosnia";
  if(n.indexOf("czech")>=0) return "czechia";
  if(n.indexOf("ivoire")>=0||n.indexOf("ivory")>=0) return "ivory coast";
  if(n.indexOf("cape verde")>=0||n.indexOf("cabo verde")>=0) return "cape verde";
  if(n.indexOf("congo")>=0&&(n.indexOf("dr")>=0||n.indexOf("dem")>=0)) return "dr congo";
  if(n.indexOf("korea")>=0&&n.indexOf("south")<0&&n.indexOf("north")<0) return "south korea";
  if(n.indexOf("south korea")>=0||n.indexOf("korea republic")>=0) return "south korea";
  if(n.indexOf("new zealand")>=0) return "new zealand";
  if(n.indexOf("south africa")>=0) return "south africa";
  if(n.indexOf("saudi")>=0) return "saudi arabia";
  if(n==="usa"||n.indexOf("united states")>=0) return "united states";
  if(n.indexOf("curacao")>=0||n.indexOf("curaçao")>=0) return "curacao";
  return n;
}

// Get official kickoff as Date object (UTC)
function getOfficialKickoff(homeName,awayName){
  var h=normTeam(homeName),a=normTeam(awayName);
  var key=h+"|"+a;
  if(KICKOFF_UTC[key]) return new Date(KICKOFF_UTC[key]);
  // Try reversed (in case API swaps home/away)
  key=a+"|"+h;
  if(KICKOFF_UTC[key]) return new Date(KICKOFF_UTC[key]);
  return null;
}

function getVenueUtcOffset(game){
  // Stadium ID → UTC offset for summer 2026 (DST)
  var stadiumOffsets={"1":6,"2":6,"3":6,"4":5,"5":5,"6":5,"7":4,"8":4,"9":4,"10":4,"11":4,"12":4,"13":7,"14":7,"15":7,"16":7};
  
  // Try ALL possible field names for stadium_id
  var sid="";
  var possibleIdFields=["stadium_id","stadiumId","stadium","venue_id","venueId","ground_id"];
  for(var f=0;f<possibleIdFields.length;f++){
    var val=game[possibleIdFields[f]];
    if(val!=null&&val!==""){
      // Could be number, string, or object with id
      if(typeof val==="object"&&val.id) sid=val.id.toString().trim();
      else if(typeof val==="object"&&val._id) sid=val._id.toString().trim();
      else sid=val.toString().trim();
      if(stadiumOffsets[sid]!==undefined) return stadiumOffsets[sid];
    }
  }
  
  // Try to find stadium name/city in any field
  var searchStr="";
  var allKeys=Object.keys(game);
  for(var k=0;k<allKeys.length;k++){
    var v=game[allKeys[k]];
    if(v==null) continue;
    if(typeof v==="object") v=JSON.stringify(v);
    searchStr+=" "+(v+"").toLowerCase();
  }
  
  // PDT venues (UTC-7)
  if(/sofi|levi|lumen|bc.?place|vancouver|seattle|santa.?clara|inglewood|los.?angeles|san.?francisco/.test(searchStr)) return 7;
  // CDT US venues (UTC-5)
  if(/nrg|at.?t.?stadium|arrowhead|geha|houston|arlington|dallas|kansas/.test(searchStr)) return 5;
  // CDT Mexico (UTC-6)
  if(/azteca|akron|bbva|mexico.?city|guadalajara|monterrey/.test(searchStr)) return 6;
  // EDT venues (UTC-4)
  if(/metlife|hard.?rock|gillette|lincoln.?fin|mercedes.?benz|bmo|new.?york|east.?rutherford|miami|boston|foxborough|philadelphia|toronto|atlanta/.test(searchStr)) return 4;
  
  // FALLBACK: If no stadium info found, try to determine from the scheduled time itself
  // Log for debugging
  
  return 4; // Default EDT
}

function parseWorldcup26(data){
  // Debug: log first game object keys/structure
  
  // worldcup26.ir format
  var matches=[];
  var games=data.games||data.data||(Array.isArray(data)?data:[]);
  for(var i=0;i<games.length;i++){
    var g=games[i];
    var home=g.home_team_name_en||g.home_team_en||g.home_team||"";
    var away=g.away_team_name_en||g.away_team_en||g.away_team||"";
    var hg=g.home_score!=null?parseInt(g.home_score):null;
    var ag=g.away_score!=null?parseInt(g.away_score):null;
    if(isNaN(hg)) hg=null;
    if(isNaN(ag)) ag=null;
    var stage=g.type||g.round||"group";
    var groupId=(g.group||"").toString().toUpperCase();
    var date=g.datetime||g.local_date||g.date||g.utc_date||"";
    
    // Determine match status
    var finStr=(g.finished||"").toString().toUpperCase();
    var statusStr=(g.status||g.match_status||"").toString().toLowerCase().trim();
    var timeEl=(g.time_elapsed||g.time||g.minute||"").toString().toLowerCase().trim();
    // Use status field only if it looks like a time/minute (not a match state)
    if(!timeEl&&/^[0-9]/.test(statusStr)) timeEl=statusStr;
    // Detect finished from multiple possible indicators
    var isFinished=(finStr==="TRUE"||finStr==="YES"||statusStr==="completed"||statusStr==="finished"||statusStr==="ended"||statusStr==="full-time"||statusStr==="ft"||timeEl==="finished"||timeEl==="ft"||timeEl==="full time"||timeEl==="full-time"||timeEl==="aet");
    var isLive=false;
    if(!isFinished){
      // Live if: time_elapsed has digits or known keywords
      if(/[0-9]/.test(timeEl)||timeEl==="ht"||timeEl==="et"||timeEl==="pen"||timeEl==="half time"||timeEl==="extra time"||timeEl==="penalties"||timeEl==="half-time"){
        isLive=true;
      }
      // Also live if: not finished, has real scores (at least one goal scored)
      if(!isLive&&hg!==null&&ag!==null&&(hg>0||ag>0)&&finStr!=="TRUE"){
        isLive=true;
      }
    }
    if(home&&away){
      var venueOff=getVenueUtcOffset(g);
      var hp=g.home_penalty!=null?parseInt(g.home_penalty):null;
      var ap=g.away_penalty!=null?parseInt(g.away_penalty):null;
      if(isNaN(hp))hp=null;if(isNaN(ap))ap=null;
      var extraTime=(timeEl==="aet"||statusStr==="aet"||g.extra_time==="true"||g.extra_time===true);
      matches.push({home:home,away:away,hg:hg,ag:ag,hp:hp,ap:ap,aet:extraTime,finished:isFinished,live:isLive,stage:stage,group:groupId,date:date,timeElapsed:timeEl,utcOff:venueOff});
    }
  }
  return matches;
}
function parseFootballdata(data){
  var matches=[];
  var games=data.matches||[];
  for(var i=0;i<games.length;i++){
    var g=games[i];
    var home=g.homeTeam?(g.homeTeam.name||g.homeTeam.shortName):"";
    var away=g.awayTeam?(g.awayTeam.name||g.awayTeam.shortName):"";
    var hg=(g.score&&g.score.fullTime)?g.score.fullTime.home:null;
    var ag=(g.score&&g.score.fullTime)?g.score.fullTime.away:null;
    var isFinished=g.status==="FINISHED";
    var isLive=g.status==="IN_PLAY"||g.status==="PAUSED"||g.status==="HALFTIME";
    var stage=g.stage||"GROUP_STAGE";
    var hp=(g.score&&g.score.penalties)?g.score.penalties.home:null;
    var ap=(g.score&&g.score.penalties)?g.score.penalties.away:null;
    var aet=(g.score&&g.score.extraTime&&g.score.extraTime.home!==null);
    matches.push({home:home,away:away,hg:hg,ag:ag,hp:hp,ap:ap,aet:aet,finished:isFinished,live:isLive,stage:stage,date:g.utcDate||""});
  }
  return matches;
}

function calcPoints(){
  var scores={},det={};
  var played={};
  for(var i=0;i<keys.length;i++){scores[keys[i]]=0;det[keys[i]]=[];played[keys[i]]=0;}
  for(var i=0;i<MATCHES.length;i++){
    var m=MATCHES[i];
    if(!m.finished&&!m.live) continue;
    if(m.hg===null||m.ag===null) continue;
    if(m.live&&m.hg===0&&m.ag===0) continue;
    var isProv=m.live&&!m.finished;
    var isGroup=(m.stage||"").toLowerCase().indexOf("group")>=0||(m.stage||"").toLowerCase()==="group_stage";
    if(isGroup){
      var ho=findOwner(m.home);
      if(ho){played[ho.player]++;var mul=MULT[ho.team.t];var p=0;
        if(m.hg>m.ag){p=2*mul;det[ho.player].push({tm:ho.team.it,ev:"W vs "+m.away+" ("+m.hg+"-"+m.ag+")"+(isProv?" *":""),p:p,prov:isProv});}
        else if(m.hg===m.ag){p=1*mul;det[ho.player].push({tm:ho.team.it,ev:"D vs "+m.away+" ("+m.hg+"-"+m.ag+")"+(isProv?" *":""),p:p,prov:isProv});}
        else{det[ho.player].push({tm:ho.team.it,ev:"L vs "+m.away+" ("+m.hg+"-"+m.ag+")"+(isProv?" *":""),p:0,prov:isProv});}
        scores[ho.player]+=p;}
      var ao=findOwner(m.away);
      if(ao){played[ao.player]++;var mul=MULT[ao.team.t];var p=0;
        if(m.ag>m.hg){p=2*mul;det[ao.player].push({tm:ao.team.it,ev:"W vs "+m.home+" ("+m.ag+"-"+m.hg+")"+(isProv?" *":""),p:p,prov:isProv});}
        else if(m.ag===m.hg){p=1*mul;det[ao.player].push({tm:ao.team.it,ev:"D vs "+m.home+" ("+m.ag+"-"+m.hg+")"+(isProv?" *":""),p:p,prov:isProv});}
        else{det[ao.player].push({tm:ao.team.it,ev:"L vs "+m.home+" ("+m.ag+"-"+m.hg+")"+(isProv?" *":""),p:0,prov:isProv});}
        scores[ao.player]+=p;}
    }else{
      // Knockout: only award points to the WINNER who ADVANCES
      if(!m.finished) continue;
      var stg=(m.stage||"").toLowerCase();
      var winner=null;
      if(m.hg>m.ag) winner=m.home;
      else if(m.ag>m.hg) winner=m.away;
      if(!winner) continue; // draws in KO go to pens - winner unclear without pen data
      var wo=findOwner(winner);
      if(wo){
        var mul=MULT[wo.team.t];
        var bonus=0,label="";
        // What round did they ADVANCE TO by winning this match?
        if(stg.indexOf("32")>=0||stg.indexOf("r32")>=0){bonus=5;label="Qualificazione Ottavi";}
        else if(stg.indexOf("16")>=0||stg.indexOf("r16")>=0||stg.indexOf("last_16")>=0){bonus=5;label="Quarti di finale";}
        else if(stg.indexOf("quarter")>=0||stg.indexOf("quart")>=0){bonus=10;label="Semifinale";}
        else if(stg.indexOf("semi")>=0&&stg.indexOf("final")<0){bonus=15;label="Finale";}
        else if(stg.indexOf("final")>=0&&stg.indexOf("semi")<0){bonus=20;label="CAMPIONE DEL MONDO!";}
        if(bonus>0){var p=bonus*mul;scores[wo.player]+=p;det[wo.player].push({tm:wo.team.it,ev:label,p:p});}
      }
    }
  }
  
  // === QUALIFICATION & GROUP POSITION BONUSES ===
  // Build group standings from finished group matches
  var groupTeams={}; // groupId → [{team,w,d,l,gf,ga,pts}]
  for(var i=0;i<MATCHES.length;i++){
    var m=MATCHES[i];
    if(!m.finished) continue;
    if(m.hg===null||m.ag===null) continue;
    var isGroup=(m.stage||"").toLowerCase().indexOf("group")>=0||(m.stage||"").toLowerCase()==="group_stage";
    if(!isGroup) continue;
    var grp=m.group||(m.stage||"").replace(/.*group.?/i,"").replace(/[^a-lA-L0-9]/g,"").toUpperCase()||"?";
    // Init teams
    if(!groupTeams[grp]) groupTeams[grp]=[];
    var updateTeam=function(gTeams,name,gf,ga){
      var found=null;
      for(var t=0;t<gTeams.length;t++){if(gTeams[t].team===name){found=gTeams[t];break;}}
      if(!found){found={team:name,w:0,d:0,l:0,gf:0,ga:0,pts:0,mp:0};gTeams.push(found);}
      found.gf+=gf;found.ga+=ga;found.mp++;
      if(gf>ga){found.w++;found.pts+=3;}
      else if(gf===ga){found.d++;found.pts+=1;}
      else{found.l++;}
    };
    updateTeam(groupTeams[grp],m.home,m.hg,m.ag);
    updateTeam(groupTeams[grp],m.away,m.ag,m.hg);
  }
  // Sort each group: pts → gd → gf
  var qualifiedTeams={};
  var thirdPlaces=[];
  for(var grp in groupTeams){
    var gt=groupTeams[grp];
    // Only process completed groups (all teams played 3 matches each, at least 4 teams)
    var complete=true;
    for(var t=0;t<gt.length;t++){if(gt[t].mp<3){complete=false;break;}}
    if(!complete||gt.length<3) continue;
    gt.sort(function(a,b){
      if(b.pts!==a.pts) return b.pts-a.pts;
      var gdA=a.gf-a.ga,gdB=b.gf-b.ga;
      if(gdB!==gdA) return gdB-gdA;
      return b.gf-a.gf;
    });
    // 1st and 2nd qualify automatically
    if(gt[0]){qualifiedTeams[gt[0].team]="1st";} 
    if(gt[1]){qualifiedTeams[gt[1].team]="2nd";}
    if(gt[2]){thirdPlaces.push(gt[2]);}
  }
  // Best 8 third-place teams qualify (48-team format: 12 groups, 8 best 3rds qualify)
  thirdPlaces.sort(function(a,b){
    if(b.pts!==a.pts) return b.pts-a.pts;
    var gdA=a.gf-a.ga,gdB=b.gf-b.ga;
    if(gdB!==gdA) return gdB-gdA;
    return b.gf-a.gf;
  });
  for(var t=0;t<Math.min(8,thirdPlaces.length);t++){
    qualifiedTeams[thirdPlaces[t].team]="3rd";
  }
  
  // Also: any team in a knockout match qualifies (in case group data is incomplete)
  for(var i=0;i<MATCHES.length;i++){
    var m=MATCHES[i];
    var isGroup=(m.stage||"").toLowerCase().indexOf("group")>=0||(m.stage||"").toLowerCase()==="group_stage";
    if(isGroup) continue;
    if(m.home&&!qualifiedTeams[m.home]) qualifiedTeams[m.home]="KO";
    if(m.away&&!qualifiedTeams[m.away]) qualifiedTeams[m.away]="KO";
  }
  
  // Award qualification + position bonuses (once per team)
  var awardedQual={};
  for(var team in qualifiedTeams){
    var ow=findOwner(team);
    if(!ow) continue;
    if(awardedQual[team]) continue;
    awardedQual[team]=true;
    var mul=MULT[ow.team.t];
    var pos=qualifiedTeams[team];
        // Position bonus
    if(pos==="1st"){var pp=5*mul;scores[ow.player]+=pp;det[ow.player].push({tm:ow.team.it,ev:"1° nel girone",p:pp});}
    else if(pos==="2nd"){var pp=3*mul;scores[ow.player]+=pp;det[ow.player].push({tm:ow.team.it,ev:"2° nel girone",p:pp});}
  }

  return{scores:scores,det:det,played:played};
}

  for(var i=0;i<sorted.length;i++){var pl=sorted[i],teams=PLAYERS[pl];
    h+="<h3>"+pl+" - "+sc[pl].toFixed(1)+" pts</h3><table><thead><tr><th>Squadra</th><th>Fascia</th><th>x</th><th>Pts</th></tr></thead><tbody>";
    for(var j=0;j<teams.length;j++){var tm=teams[j],tp=0;for(var d=0;d<det[pl].length;d++){if(det[pl][d].tm===tm.it)tp+=det[pl][d].p;}
      h+="<tr><td>"+flag(tm.f)+tm.it+"</td><td class='t"+tm.t+"'>"+tm.t+"a</td><td>x"+MULT[tm.t]+"</td><td style='font-family:var(--mn);font-weight:700;color:"+(tp>0?"var(--ok)":"var(--tx3)")+"'>"+tp.toFixed(1)+"</td></tr>";}
    h+="</tbody></table>";
    if(det[pl].length>0){h+='<div class="brk">';for(var d=0;d<det[pl].length;d++){var item=det[pl][d];h+='<div class="bi"'+(item.prov?' style="border-color:var(--wa);opacity:0.8"':'')+' ><span class="bl">'+item.tm+" - "+item.ev+'</span><span class="bv'+(item.p===0?" zero":"")+(item.prov?'" style="color:var(--wa)':'')+'">+'+item.p.toFixed(1)+'</span></div>';}h+='</div>';}}
  document.getElementById("p-det").innerHTML=h;
  // Matches
  var ms=MATCHES.slice().sort(function(a,b){if(a.live&&!b.live)return -1;if(!a.live&&b.live)return 1;return(new Date(b.date||0))-(new Date(a.date||0));});
  h="<h2>Partite ("+MATCHES.length+")</h2><div class='matchlist'>";
  for(var i=0;i<Math.min(ms.length,80);i++){var m=ms[i];var ho=findOwner(m.home),ao=findOwner(m.away);var hs=m.hg!==null?m.hg:"-";var as2=m.ag!==null?m.ag:"-";var stl=m.live?(m.timeElapsed||"LIVE"):(m.finished?"FT":"--");var hf=ho?flag(ho.team.f):(flagForTeam(m.home)?flag(flagForTeam(m.home)):"");var af=ao?flag(ao.team.f):(flagForTeam(m.away)?flag(flagForTeam(m.away)):"");
    h+='<div class="match'+(m.live?" live":"")+'"><span class="mdate">'+(m.stage||"").replace(/_/g," ").substring(0,10)+'</span><div class="mteams"><span'+(ho?' class="owned"':'')+'>'+hf+m.home+(ho?'<small class="powner"> ('+ho.player+')</small>':'')+'</span><span class="mscore">'+hs+' - '+as2+'</span><span'+(ao?' class="owned"':'')+'>'+af+m.away+(ao?'<small class="powner"> ('+ao.player+')</small>':'')+'</span></div><span class="mst'+(m.live?" live":"")+'">'+stl+'</span></div>';}
  h+="</div>";
  document.getElementById("p-match").innerHTML=h;
  renderBracket();
  renderNextGames();
  document.getElementById("upd").textContent="Ultimo aggiornamento: "+new Date().toLocaleString("it-IT")+" | Partite finite: "+MATCHES.filter(function(m){return m.finished;}).length+"/"+MATCHES.length;
}



function renderNextGames(){
  var liveEl=document.getElementById("liveGames");
  var nextEl=document.getElementById("nextGames");
  if(MATCHES.length===0){liveEl.style.display="none";nextEl.innerHTML="";return;}
  
  var now=new Date();
  var upcoming=[];
  var live=[];
  
  function parseMatchDate(dateStr,utcOff){
    if(!dateStr) return null;
    var off=(typeof utcOff==="number")?utcOff:4;
    var m2=dateStr.match(/^(\d{2})\/(\d{2})\/(\d{4})\s+(\d{2}):(\d{2})/);
    if(m2){var utcMs=Date.UTC(parseInt(m2[3]),parseInt(m2[1])-1,parseInt(m2[2]),parseInt(m2[4])+off,parseInt(m2[5]));return new Date(utcMs);}
    if(dateStr.indexOf("T")>=0){var d=new Date(dateStr);if(!isNaN(d.getTime()))return d;}
    var d=new Date(dateStr);if(!isNaN(d.getTime()))return d;
    return null;
  }
  
  for(var i=0;i<MATCHES.length;i++){
    var m=MATCHES[i];
    if(m.live){live.push(m);continue;}
    if(m.finished) continue;
    if(!m.date) continue;
    var d=getOfficialKickoff(m.home,m.away)||parseMatchDate(m.date,m.utcOff);
    if(!d) continue;
    if(d>now) upcoming.push({match:m,date:d});
  }
  upcoming.sort(function(a,b){return a.date-b.date;});

  // === LIVE SECTION ===
  if(live.length>0){
    liveEl.style.display="block";
    var h='<h3 style="color:var(--ok)">\u26BD Partite in Corso</h3>';
    for(var i=0;i<live.length;i++){
      var m=live[i];
      var ho=findOwner(m.home),ao=findOwner(m.away);
      var hf=ho?flag(ho.team.f):"";
      var af=ao?flag(ao.team.f):"";
      var score=(m.hg!=null&&m.ag!=null)?m.hg+" - "+m.ag:"0 - 0";
      h+='<div class="next-game" style="border-color:var(--ok);border-width:2px">';
      h+='<span class="ng-countdown live">\u25CF LIVE</span>';
      h+='<div class="ng-teams">';
      h+='<span'+(ho?' class="owned"':'')+'>'+hf+m.home+(ho?'<span class="ng-player">('+ho.player+')</span>':'')+'</span>';
      h+='<span class="ng-vs" style="font-size:16px;font-weight:800;color:var(--tx);font-family:var(--mn)">'+score+'</span>';
      h+='<span'+(ao?' class="owned"':'')+'>'+af+m.away+(ao?'<span class="ng-player">('+ao.player+')</span>':'')+'</span>';
      h+='</div>';
      h+='<span class="ng-time" style="color:var(--ok)">'+(m.timeElapsed||"Live").replace(/'/g,"'").toUpperCase()+'</span>';
      h+='</div>';
    }
    liveEl.innerHTML=h;
  }else{
    liveEl.style.display="none";
    liveEl.innerHTML="";
  }

  // === UPCOMING SECTION ===
  var showUpcoming=upcoming.slice(0,5);
  if(showUpcoming.length>0){
    var h='<h3>\u23F3 Prossime Partite</h3>';
    
    for(var i=0;i<showUpcoming.length;i++){
      var m=showUpcoming[i].match;
      var d=showUpcoming[i].date;
      var ho=findOwner(m.home),ao=findOwner(m.away);
      var hf=ho?flag(ho.team.f):"";
      var af=ao?flag(ao.team.f):"";
      
      var diff=d-now;
      var countdown="";
      if(diff>0){
        var hours=Math.floor(diff/3600000);
        var mins=Math.floor((diff%3600000)/60000);
        if(hours>=24){
          var days=Math.floor(hours/24);
          countdown='<span class="ng-countdown">'+days+'g '+Math.floor(hours%24)+'h</span>';
        }else if(hours>0){
          countdown='<span class="ng-countdown">'+hours+'h '+mins+'m</span>';
        }else{
          countdown='<span class="ng-countdown" style="color:var(--ok)">'+mins+' min</span>';
        }
      }
      var timeStr=d.toLocaleString(undefined,{weekday:"short",day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"});
      
      h+='<div class="next-game">';
      h+=countdown;
      h+='<div class="ng-teams">';
      h+='<span'+(ho?' class="owned"':'')+'>'+hf+m.home+(ho?'<span class="ng-player">('+ho.player+')</span>':'')+'</span>';
      h+='<span class="ng-vs">vs</span>';
      h+='<span'+(ao?' class="owned"':'')+'>'+af+m.away+(ao?'<span class="ng-player">('+ao.player+')</span>':'')+'</span>';
      h+='</div>';
      h+='<span class="ng-time">'+timeStr+'</span>';
      h+='</div>';
    }
    nextEl.innerHTML=h;
  }else{
    nextEl.innerHTML="";
  }
}
// Update countdown every minute
setInterval(function(){
  // Check if any match is live → fetch fresh data more often
  var anyLive=false;
  for(var i=0;i<MATCHES.length;i++){if(MATCHES[i].live){anyLive=true;break;}}
  if(anyLive||MATCHES.length>0) renderNextGames();
},60000);
// Auto re-fetch handled by doFetch + Auto 5min button

function renderBracket(){
  var el=document.getElementById("p-bracket");
  var ko=MATCHES.filter(function(m){return (m.stage||"").toLowerCase().indexOf("group")<0 && m.stage!=="group";});
  
  if(ko.length===0){
    var h='<h2>Fase Eliminazione</h2><p style="color:var(--tx2);margin-bottom:16px">La fase a eliminazione non \u00e8 ancora iniziata.</p>';
    h+='<h3>Squadre in gara per giocatore</h3><div class="brk" style="margin-top:10px">';
    var keys2=Object.keys(PLAYERS);
    for(var i=0;i<keys2.length;i++){
      var pl=keys2[i],teams=PLAYERS[pl];
      for(var j=0;j<teams.length;j++){
        h+='<div class="bi"><span class="bl">'+flag(teams[j].f)+teams[j].it+'</span><span class="bv" style="color:var(--tx2);font-size:11px">'+pl+'</span></div>';
      }
    }
    h+='</div>';
    el.innerHTML=h;
    return;
  }

  var stageOrder=["LAST_32","ROUND_OF_32","LAST_16","ROUND_OF_16","QUARTER_FINALS","SEMI_FINALS","FINAL"];
  var stageLabels={"LAST_32":"Sedicesimi","ROUND_OF_32":"Sedicesimi","LAST_16":"Ottavi","ROUND_OF_16":"Ottavi","QUARTER_FINALS":"Quarti","SEMI_FINALS":"Semifinali","FINAL":"Finale"};
  
  var stageMap={};
  for(var i=0;i<ko.length;i++){
    var st=(ko[i].stage||"").toUpperCase();
    if(!stageMap[st])stageMap[st]=[];
    stageMap[st].push(ko[i]);
  }
  
  var rounds=[];
  for(var s=0;s<stageOrder.length;s++){
    if(stageMap[stageOrder[s]]){
      rounds.push({key:stageOrder[s],name:stageLabels[stageOrder[s]]||stageOrder[s],matches:stageMap[stageOrder[s]]});
    }
  }
  var usedKeys=rounds.map(function(r){return r.key;});usedKeys.push("THIRD_PLACE");
  var otherKeys=Object.keys(stageMap).filter(function(k){return usedKeys.indexOf(k)<0;});
  for(var i=0;i<otherKeys.length;i++){rounds.push({key:otherKeys[i],name:stageLabels[otherKeys[i]]||otherKeys[i],matches:stageMap[otherKeys[i]]});}

  // Order matches within rounds by bracket position:
  // Use next round to determine ordering of current round.
  // If next round match has home=X, away=Y, find which current round matches 
  // have X and Y as participants/winners, and place them adjacent.
  for(var r=0;r<rounds.length-1;r++){
    var curr=rounds[r].matches;
    var next=rounds[r+1].matches;
    var ordered=[];
    var used={};
    for(var n=0;n<next.length;n++){
      var nm=next[n];
      // Find which current matches feed into this next match
      var feedA=null,feedB=null;
      for(var c=0;c<curr.length;c++){
        if(used[c]) continue;
        var cm=curr[c];
        var winner=getMatchWinner(cm);
        if(winner&&(norm(winner)===norm(nm.home)||norm(winner)===norm(nm.away))){
          if(!feedA){feedA=c;used[c]=true;}
          else{feedB=c;used[c]=true;break;}
        }
        // Also check if team names from current match appear in next match
        if(!winner){
          if(norm(cm.home)===norm(nm.home)||norm(cm.home)===norm(nm.away)||norm(cm.away)===norm(nm.home)||norm(cm.away)===norm(nm.away)){
            if(!feedA){feedA=c;used[c]=true;}
            else if(!feedB){feedB=c;used[c]=true;break;}
          }
        }
      }
      if(feedA!==null) ordered.push(curr[feedA]);
      if(feedB!==null) ordered.push(curr[feedB]);
    }
    // Add any remaining unmatched
    for(var c=0;c<curr.length;c++){if(!used[c]) ordered.push(curr[c]);}
    if(ordered.length===curr.length) rounds[r].matches=ordered;
  }

  var h='<h2>Fase Eliminazione</h2>';
  h+='<div class="bkt-wrap"><div class="bkt">';
  
  for(var r=0;r<rounds.length;r++){
    var round=rounds[r];
    var isLast=(r===rounds.length-1);
    h+='<div class="bkt-round"><div class="bkt-rtitle">'+round.name+'</div><div class="bkt-col">';
    for(var i=0;i<round.matches.length;i+=2){
      var m1=round.matches[i];
      var m2=round.matches[i+1];
      h+='<div class="bkt-pair'+(isLast?'':' has-line')+'">';
      h+=bktMatch(m1);
      if(m2) h+=bktMatch(m2);
      h+='</div>';
    }
    h+='</div></div>';
  }
  h+='</div></div>';
  
  var tp=stageMap["THIRD_PLACE"];
  if(tp&&tp.length>0){
    h+='<div style="margin-top:20px;max-width:220px"><div class="bkt-rtitle">3\u00b0 Posto</div>';
    h+=bktMatch(tp[0]);
    h+='</div>';
  }
  el.innerHTML=h;
}

function norm(s){return s?s.toLowerCase().replace(/[^a-z]/g,""):"";}

function getMatchWinner(m){
  if(!m.finished||m.hg===null||m.ag===null) return null;
  if(m.hp!==null&&m.ap!==null){return m.hp>m.ap?m.home:m.away;}
  if(m.hg>m.ag) return m.home;
  if(m.ag>m.hg) return m.away;
  return null; // draw without pen data
}

function bktMatch(m){
  var ho=findOwner(m.home),ao=findOwner(m.away);
  var hWon=false,aWon=false;
  if(m.finished&&m.hg!==null&&m.ag!==null){
    if(m.hp!==null&&m.ap!==null){hWon=m.hp>m.ap;aWon=m.ap>m.hp;}
    else{hWon=m.hg>m.ag;aWon=m.ag>m.hg;}
  }
  var hf=ho?flag(ho.team.f,16):(flagForTeam(m.home)?flag(flagForTeam(m.home),16):'');
  var af=ao?flag(ao.team.f,16):(flagForTeam(m.away)?flag(flagForTeam(m.away),16):'');
  var hScore=(m.hg!==null?m.hg:'-');
  var aScore=(m.ag!==null?m.ag:'-');
  var extra='';
  if(m.hp!==null&&m.ap!==null){
    extra='<div class="bkt-extra"><span class="bkt-pen'+(hWon?' pen-home':'')+(aWon?' pen-away':'')+'">rig. '+m.hp+'-'+m.ap+'</span></div>';
  } else if(m.aet){
    extra='<div class="bkt-extra"><span class="bkt-pen">d.t.s.</span></div>';
  }
  
  var s='<div class="bkt-match'+(m.finished?' done':'')+'">';
  s+='<div class="bkt-team'+(hWon?' won':'')+(aWon?' lost':'')+'"><span class="bkt-name">'+hf+(m.home||'TBD')+(ho?'<span class="bkt-pl">'+ho.player+'</span>':'')+'</span><span class="bkt-score">'+hScore+'</span></div>';
  s+='<div class="bkt-team'+(aWon?' won':'')+(hWon?' lost':'')+'"><span class="bkt-name">'+af+(m.away||'TBD')+(ao?'<span class="bkt-pl">'+ao.player+'</span>':'')+'</span><span class="bkt-score">'+aScore+'</span></div>';
  s+=extra+'</div>';
  return s;
}

function renderRules(){
  var h='<h2>Regole e Punteggi</h2><table class="rules-table"><thead><tr><th>Evento</th><th>1a</th><th>2a</th><th>3a</th><th>4a</th></tr></thead><tbody>';
  h+="<tr><td>Vittoria girone</td><td>2</td><td>3</td><td>4</td><td>6</td></tr><tr><td>Pareggio girone</td><td>1</td><td>1.5</td><td>2</td><td>3</td></tr><tr><td>1o nel girone</td><td>5</td><td>7.5</td><td>10</td><td>15</td></tr><tr><td>2o nel girone</td><td>3</td><td>4.5</td><td>6</td><td>9</td></tr><tr><td>Qualif. KO</td><td>5</td><td>7.5</td><td>10</td><td>15</td></tr><tr><td>Quarti</td><td>5</td><td>7.5</td><td>10</td><td>15</td></tr><tr><td>Semifinale</td><td>10</td><td>15</td><td>20</td><td>30</td></tr><tr><td>Finale</td><td>15</td><td>22.5</td><td>30</td><td>45</td></tr><tr><td>Campione</td><td>20</td><td>30</td><td>40</td><td>60</td></tr></tbody></table>";
  h+='<h3 style="margin-top:16px">Squadre per Giocatore</h3><table class="rules-table teams-table"><thead><tr><th>Giocatore</th><th>1a</th><th>2a</th><th>3a</th><th>4a</th></tr></thead><tbody>';
for(var i=0;i<keys.length;i++){var pl=keys[i],teams=PLAYERS[pl];h+="<tr><td style='font-weight:700'>"+pl+"</td>";for(var tier=1;tier<=4;tier++){var ns=[];for(var j=0;j<teams.length;j++){if(teams[j].t===tier)ns.push(flag(teams[j].f)+teams[j].it);}h+="<td>"+ns.join("<br>")+"</td>";}h+="</tr>";}
  h+="</tbody></table>";
  document.getElementById("p-rules").innerHTML=h;
}
